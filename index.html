<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Lux Aristokrat Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b0d;
      --card:#141418;
      --stroke:rgba(255,255,255,.10);
      --gold:#d4af37;
      --gold2:#f2d777;
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --radius:22px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#0a0a0c,#111114);
      color:var(--text);
      font-family:'Montserrat',sans-serif;
      min-height:100%;
    }

    body{padding:16px;}

    .wrap{
      width:min(100%,760px);
      margin:0 auto;
    }

    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius:24px;
      padding:18px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      margin-bottom:16px;
    }

    .title{
      font-size:28px;
      font-weight:800;
      line-height:1.1;
      margin:0 0 10px;
    }

    .gold{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      color:transparent;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    #reader{
      width:100%;
      overflow:hidden;
      border-radius:18px;
      background:#000;
      min-height:280px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      border:none;
      border-radius:16px;
      min-height:50px;
      padding:0 18px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#111;
    }

    .btn-secondary{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid var(--stroke);
    }

    .field{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.04);
      color:#fff;
      padding:14px 14px;
      font-size:14px;
      outline:none;
      margin-top:10px;
    }

    .status{
      margin-top:12px;
      font-size:14px;
      color:#fff4c3;
      min-height:22px;
      font-weight:700;
    }

    .hint{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    @media (max-width:640px){
      .title{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title"><span class="gold">Lux Aristokrat</span> QR Scanner</h1>
      <div class="sub">
        Нажмите «Запустить камеру» и наведите телефон на QR-код.  
        Если камера недоступна, вставьте код вручную.
      </div>
    </div>

    <div class="card">
      <div id="reader"></div>

      <div class="actions">
        <button class="btn btn-primary" id="startBtn">📷 Запустить камеру</button>
        <button class="btn btn-secondary" id="stopBtn">⛔ Остановить</button>
      </div>

      <input id="manualCode" class="field" placeholder="Или вставьте QR-код вручную" />
      <div class="actions">
        <button class="btn btn-primary" id="sendManualBtn">✅ Отправить код</button>
      </div>

      <div class="status" id="status">Готово к сканированию</div>
      <div class="hint">
        WebApp работает внутри Telegram. Камера открывается только по кнопке и на HTTPS.
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try {
        tg.setHeaderColor?.("#0b0b0d");
        tg.setBackgroundColor?.("#0b0b0d");
      } catch (_) {}
    }

    const statusEl = document.getElementById("status");
    const manualCodeEl = document.getElementById("manualCode");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const sendManualBtn = document.getElementById("sendManualBtn");

    let qrScanner = null;
    let scannerStarted = false;

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function normalizeLocalCode(v) {
      return String(v || "")
        .trim()
        .replace(/[><!&'" .,\/\\:;?=+#%@*()\[\]{}]+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function sendCode(code) {
      const normalized = normalizeLocalCode(code);
      if (!normalized) {
        setStatus("Некорректный QR-код");
        return;
      }

      const payload = {
        action: "scan_qr",
        code: normalized
      };

      try {
        tg.sendData(JSON.stringify(payload));
        setStatus("Код отправлен в бота");
        setTimeout(() => {
          tg.close();
        }, 500);
      } catch (e) {
        setStatus("Ошибка отправки: " + e.message);
      }
    }

    async function startScanner() {
      try {
        if (!qrScanner) {
          qrScanner = new Html5Qrcode("reader");
        }

        if (scannerStarted) {
          setStatus("Камера уже запущена");
          return;
        }

        await qrScanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 240, height: 240 },
            aspectRatio: 1.333334
          },
          (decodedText) => {
            setStatus("QR найден: " + decodedText);
            stopScanner().finally(() => sendCode(decodedText));
          },
          () => {}
        );

        scannerStarted = true;
        setStatus("Камера запущена. Наведите на QR-код.");
      } catch (e) {
        setStatus("Не удалось открыть камеру. Используйте ручной ввод.");
      }
    }

    async function stopScanner() {
      try {
        if (qrScanner && scannerStarted) {
          await qrScanner.stop();
          await qrScanner.clear();
          scannerStarted = false;
          setStatus("Камера остановлена");
        }
      } catch (_) {}
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);

    sendManualBtn.addEventListener("click", () => {
      sendCode(manualCodeEl.value);
    });

    manualCodeEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendCode(manualCodeEl.value);
      }
    });
  </script>
</body>
</html>
