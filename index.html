<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Lux Aristokrat QR Scanner</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --bg:#080809;
      --card:rgba(18,18,20,.72);
      --text:#f6ecd1;
      --muted:#c6b083;
      --line:rgba(212,175,55,.18);
      --gold:#d4af37;
      --gold-soft:#f4df9a;
      --gold-deep:#9f7b19;
      --shadow:0 18px 50px rgba(0,0,0,.42);
      --radius:22px;
      --success:#53d29a;
      --danger:#ff7272;
      --info:#8fc8ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(212,175,55,.12), transparent 22%),
        radial-gradient(circle at 88% 8%, rgba(212,175,55,.10), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(212,175,55,.06), transparent 34%),
        linear-gradient(180deg, #070708 0%, #0d0d0f 100%);
      overflow-x:hidden;
    }

    .app{
      max-width:720px;
      margin:0 auto;
      min-height:100vh;
      padding:14px 14px 28px;
    }

    .glass{
      backdrop-filter:blur(16px) saturate(125%);
      -webkit-backdrop-filter:blur(16px) saturate(125%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(212,175,55,.08), rgba(212,175,55,.02));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .profile-card{
      flex:1;
      min-width:0;
      border-radius:24px;
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, var(--gold-soft), var(--gold)),
        linear-gradient(180deg, var(--gold-soft), var(--gold-deep));
      color:#241903;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:20px;
      flex:0 0 56px;
      border:1px solid rgba(255,255,255,.18);
    }

    .profile-text{
      min-width:0;
      flex:1;
    }

    .brand{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
      letter-spacing:.9px;
      text-transform:uppercase;
    }

    .name{
      font-size:18px;
      font-weight:900;
      line-height:1.2;
      color:#fff4d2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .lang-btn{
      width:56px;
      height:56px;
      border-radius:18px;
      cursor:pointer;
      flex:0 0 56px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--gold-soft);
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(212,175,55,.06), rgba(212,175,55,.02));
      box-shadow:var(--shadow);
      font-size:13px;
      font-weight:900;
    }

    .lang-menu{
      position:absolute;
      top:72px;
      right:14px;
      width:120px;
      border-radius:16px;
      overflow:hidden;
      z-index:30;
      display:none;
      background:
        linear-gradient(180deg, rgba(18,18,20,.96), rgba(10,10,11,.98));
      border:1px solid var(--line);
      box-shadow:0 18px 40px rgba(0,0,0,.42);
    }

    .lang-menu.show{
      display:block;
    }

    .lang-option{
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      text-align:left;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      border-bottom:1px solid rgba(212,175,55,.08);
    }

    .lang-option:last-child{
      border-bottom:none;
    }

    .lang-option.active{
      color:#241903;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    }

    .card{
      border-radius:var(--radius);
      overflow:hidden;
      position:relative;
    }

    .scanner-head{
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(212,175,55,.10), rgba(212,175,55,0));
    }

    .scanner-title{
      font-size:21px;
      font-weight:900;
      margin:0 0 6px;
      color:#fff2cb;
    }

    .scanner-subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .camera-wrap{
      position:relative;
      background:#000;
      aspect-ratio:3 / 4;
      min-height:360px;
      overflow:hidden;
    }

    #reader{
      width:100%;
      height:100%;
      background:#000;
    }

    #reader video{
      width:100% !important;
      height:100% !important;
      object-fit:cover !important;
      background:#000 !important;
    }

    #reader__dashboard_section_swaplink,
    #reader__dashboard_section_csr,
    #reader__dashboard_section_fsr,
    #reader__scan_region img{
      display:none !important;
    }

    #reader__scan_region{
      min-height:360px;
      display:flex !important;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    .scan-overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .scan-frame{
      width:min(72vw, 290px);
      height:min(72vw, 290px);
      border:2px solid rgba(244,223,154,.95);
      border-radius:30px;
      position:relative;
      overflow:hidden;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,.28),
        0 0 24px rgba(212,175,55,.16);
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame .corner-left-bottom,
    .scan-frame .corner-right-top{
      content:"";
      position:absolute;
      width:46px;
      height:46px;
      border:4px solid var(--gold-soft);
      opacity:.96;
    }

    .scan-frame::before{
      top:-2px;
      left:-2px;
      border-right:0;
      border-bottom:0;
      border-top-left-radius:22px;
    }

    .scan-frame::after{
      right:-2px;
      bottom:-2px;
      border-left:0;
      border-top:0;
      border-bottom-right-radius:22px;
    }

    .scan-frame .corner-left-bottom{
      left:-2px;
      bottom:-2px;
      border-right:0;
      border-top:0;
      border-bottom-left-radius:22px;
    }

    .scan-frame .corner-right-top{
      right:-2px;
      top:-2px;
      border-left:0;
      border-bottom:0;
      border-top-right-radius:22px;
    }

    .scan-line{
      position:absolute;
      left:14px;
      right:14px;
      top:18px;
      height:3px;
      border-radius:99px;
      background:linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      animation:scan 2s linear infinite;
      box-shadow:0 0 20px rgba(244,223,154,.9);
    }

    @keyframes scan{
      0%{ top:18px; }
      100%{ top:calc(100% - 21px); }
    }

    .status{
      margin-top:14px;
      padding:14px 16px;
      font-size:14px;
      line-height:1.5;
      border-top:1px solid var(--line);
      background:rgba(255,255,255,.015);
    }

    .status.info{ color:var(--muted); }
    .status.success{ color:var(--success); font-weight:700; }
    .status.error{ color:var(--danger); font-weight:700; }

    .banner{
      margin:12px 14px 0;
      border-radius:16px;
      padding:12px 14px;
      font-size:14px;
      line-height:1.45;
      display:none;
      border:1px solid transparent;
    }

    .banner.show{ display:block; }
    .banner.info{
      color:#d9ecff;
      background:rgba(80,140,210,.12);
      border-color:rgba(80,140,210,.25);
    }
    .banner.success{
      color:#dff8ec;
      background:rgba(83,210,154,.12);
      border-color:rgba(83,210,154,.25);
    }
    .banner.error{
      color:#ffdede;
      background:rgba(255,114,114,.12);
      border-color:rgba(255,114,114,.25);
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:0 14px 14px;
      margin-top:10px;
    }

    .btn{
      border:none;
      border-radius:16px;
      min-height:48px;
      padding:0 12px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-primary{
      color:#2a1d00;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      box-shadow:0 10px 24px rgba(212,175,55,.22);
    }

    .btn-secondary{
      color:var(--gold-soft);
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(25,25,28,.96), rgba(18,18,20,.96));
    }

    .manual-card{
      margin-top:14px;
      padding:14px;
      border-radius:var(--radius);
      position:relative;
      overflow:hidden;
    }

    .manual-title{
      position:relative;
      z-index:1;
      font-size:16px;
      font-weight:900;
      margin:0 0 10px;
      color:#fff2cb;
    }

    .manual-row{
      position:relative;
      z-index:1;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .manual-input{
      flex:1;
      height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:0 14px;
      font-size:15px;
      outline:none;
    }

    .manual-input::placeholder{
      color:#a69269;
    }

    .manual-input:focus{
      border-color:rgba(244,223,154,.44);
      box-shadow:0 0 0 3px rgba(212,175,55,.12);
    }

    .footer-note{
      text-align:center;
      color:#9f8f6f;
      font-size:12px;
      margin-top:14px;
      padding-bottom:8px;
    }

    @media (max-width: 520px){
      .actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="profile-card glass">
        <div class="avatar" id="avatar">L</div>
        <div class="profile-text">
          <div class="brand">Lux Aristokrat</div>
          <div class="name" id="userName">Гость</div>
          <div class="sub" id="userSub">Premium QR bonus system</div>
        </div>
      </div>

      <button class="lang-btn" id="langBtn" type="button">RU</button>
      <div class="lang-menu" id="langMenu">
        <button class="lang-option" data-lang="ru">🇷🇺 RU</button>
        <button class="lang-option" data-lang="uz">🇺🇿 UZ</button>
        <button class="lang-option" data-lang="tj">🇹🇯 TJ</button>
        <button class="lang-option" data-lang="en">🇬🇧 EN</button>
      </div>
    </div>

    <div class="card glass">
      <div class="scanner-head">
        <h1 class="scanner-title" id="scannerTitle">📷 Сканировать QR</h1>
        <p class="scanner-subtitle" id="scannerSubtitle">
          Наведите камеру на QR-код или Data Matrix. После распознавания код отправится в бота, а окно не закроется.
        </p>
      </div>

      <div class="camera-wrap">
        <div id="reader"></div>

        <div class="scan-overlay">
          <div class="scan-frame">
            <div class="corner-left-bottom"></div>
            <div class="corner-right-top"></div>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <div class="status info" id="status">Инициализация камеры...</div>
      <div class="banner info" id="banner"></div>

      <div class="actions">
        <button class="btn btn-primary" id="restartBtn" type="button">Перезапустить</button>
        <button class="btn btn-secondary" id="switchBtn" type="button">Сменить камеру</button>
        <button class="btn btn-secondary" id="closeBtn" type="button">Закрыть</button>
      </div>
    </div>

    <div class="manual-card glass">
      <h2 class="manual-title" id="manualTitle">Ручной ввод кода</h2>
      <div class="manual-row">
        <input
          id="manualCode"
          class="manual-input"
          type="text"
          placeholder="Введите код вручную"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
        />
        <button class="btn btn-primary" id="sendManualBtn" type="button" style="padding:0 18px;">
          Отправить
        </button>
      </div>
    </div>

    <div class="footer-note" id="footerNote">
      Lux Aristokrat • Premium QR Scanner
    </div>
  </div>

    if (tg) {

    const user = tg?.initDataUnsafe?.user || null;

    const i18n = {

        restart: "Restart",

        statusReady: "Camera is active. Point it at the code.",
        statusSent: "Code sent to the bot. You can scan the next one.",

        statusNeedCode: "Enter or scan a valid code.",
        statusNoTelegram: "Telegram WebApp is unavailable.",
        statusSendError: "Failed to send code to the bot.",
        statusCameraNotFound: "Camera not found.",
        statusCameraError: "Could not start the camera. Please allow camera access.",
        bannerSent: "Code sent. Points are processed by the bot. If the code was already used, the bot will notify and will not count it again.",

        bannerSwitched: "Camera switched.",
        bannerPermission: "Camera permission depends on Telegram and the device. Inside this session it is not requested again unnecessarily."

    let currentLang = localStorage.getItem("lux_lang") || "ru";
    if (!i18n[currentLang]) currentLang = "ru";

    const userNameEl = document.getElementById("userName");
    const userSubEl = document.getElementById("userSub");
    const avatarEl = document.getElementById("avatar");
    const statusEl = document.getElementById("status");
    const bannerEl = document.getElementById("banner");
    const restartBtn = document.getElementById("restartBtn");
    const switchBtn = document.getElementById("switchBtn");
    const closeBtn = document.getElementById("closeBtn");
    const manualCodeEl = document.getElementById("manualCode");
    const sendManualBtn = document.getElementById("sendManualBtn");

    const scannerTitleEl = document.getElementById("scannerTitle");
    const scannerSubtitleEl = document.getElementById("scannerSubtitle");
    const manualTitleEl = document.getElementById("manualTitle");
    const footerNoteEl = document.getElementById("footerNote");

    const langBtn = document.getElementById("langBtn");
    const langMenu = document.getElementById("langMenu");
    const langOptions = Array.from(document.querySelectorAll(".lang-option"));

    let html5QrCode = null;
    let scannerStarted = false;
    let sendingNow = false;
    let currentStatusKey = "statusInit";
    let currentStatusType = "info";
    let camerasCache = [];
    let currentCameraIndex = 0;
    let inFlightPause = false;

    const recentlySentCodes = new Map();
    const LOCAL_DUPLICATE_TTL_MS = 15000;

    function tr(key) {
      return i18n[currentLang][key] || i18n.ru[key] || key;
    }

    function cleanupRecentCodes() {
      const now = Date.now();
      for (const [code, ts] of recentlySentCodes.entries()) {
        if (now - ts > LOCAL_DUPLICATE_TTL_MS) {
          recentlySentCodes.delete(code);
        }
      }
    }

    function wasSentRecently(code) {
      cleanupRecentCodes();
      return recentlySentCodes.has(code);
    }

    function rememberSent(code) {
      cleanupRecentCodes();
      recentlySentCodes.set(code, Date.now());
    }

    function applyLanguage() {
      localStorage.setItem("lux_lang", currentLang);
      langBtn.textContent = tr("langCode");

      scannerTitleEl.textContent = tr("scannerTitle");
      scannerSubtitleEl.textContent = tr("scannerSubtitle");
      manualTitleEl.textContent = tr("manualTitle");
      manualCodeEl.placeholder = tr("manualPlaceholder");
      sendManualBtn.textContent = tr("send");
      restartBtn.textContent = tr("restart");
      switchBtn.textContent = tr("switchCamera");
      closeBtn.textContent = tr("close");
      footerNoteEl.textContent = tr("footer");

      const fullName = user
        ? [user.first_name, user.last_name].filter(Boolean).join(" ").trim()
        : tr("guest");

      const username = user?.username ? "@" + user.username : tr("sub");
      userNameEl.textContent = fullName || tr("guest");
      userSubEl.textContent = username;

      langOptions.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === currentLang);
      });

      setStatusByKey(currentStatusKey, currentStatusType);
    }

    function setUserProfile() {
      const fullName = user
        ? [user.first_name, user.last_name].filter(Boolean).join(" ").trim()
        : tr("guest");

      const username = user?.username ? "@" + user.username : tr("sub");

      userNameEl.textContent = fullName || tr("guest");
      userSubEl.textContent = username;

      const initial = (fullName || "L").trim().charAt(0).toUpperCase();
      avatarEl.textContent = initial || "L";
    }

    function setStatus(text, type = "info") {
      statusEl.className = "status " + type;
      statusEl.textContent = text;
    }

    function setStatusByKey(key, type = "info") {
      currentStatusKey = key;
      currentStatusType = type;
      setStatus(tr(key), type);
    }

    function showBanner(text, type = "info") {
      bannerEl.className = "banner show " + type;
      bannerEl.textContent = text;
    }

    function hideBanner() {
      bannerEl.className = "banner";
      bannerEl.textContent = "";
    }

    langBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      langMenu.classList.toggle("show");
    });

    langOptions.forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.dataset.lang;
        applyLanguage();
        langMenu.classList.remove("show");
      });
    });

    document.addEventListener("click", (e) => {
      if (!langMenu.contains(e.target) && !langBtn.contains(e.target)) {
        langMenu.classList.remove("show");
      }
    });

    function normalizeCode(raw) {
      return String(raw || "").trim().toUpperCase();
    }

    async function shortPauseAfterSend() {
      inFlightPause = true;
      try {
        await new Promise(resolve => setTimeout(resolve, 1800));
      } finally {
        inFlightPause = false;
      }
    }

    async function sendCodeToBot(code, fromManual = false) {
      const normalized = normalizeCode(code);

      if (!normalized) {
        setStatusByKey("statusNeedCode", "error");
        return;
      }

      if (sendingNow || inFlightPause) return;

      if (wasSentRecently(normalized)) {
        setStatusByKey("statusDuplicateLocal", "error");
        return;
      }

      sendingNow = true;
      rememberSent(normalized);
      setStatusByKey("statusLoading", "info");

      const payload = {
        action: "scan_qr",
        code: normalized
      };

      try {
        if (tg && typeof tg.sendData === "function") {
          tg.sendData(JSON.stringify(payload));

          setStatusByKey("statusSent", "success");
          showBanner(fromManual ? tr("bannerManual") : tr("bannerSent"), "success");

          await shortPauseAfterSend();
          setStatusByKey("statusReady", "info");
        } else {
          setStatusByKey("statusNoTelegram", "error");
        }
      } catch (e) {
        setStatusByKey("statusSendError", "error");
      } finally {
        sendingNow = false;
      }
    }

    async function stopScanner() {
      try {
        if (html5QrCode && scannerStarted) {
          await html5QrCode.stop();
        }
      } catch (e) {}

      try {
        if (html5QrCode) {
          await html5QrCode.clear();
        }
      } catch (e) {}

      html5QrCode = null;
      scannerStarted = false;
    }

    async function loadCameras() {
      try {
        const cams = await Html5Qrcode.getCameras();
        camerasCache = Array.isArray(cams) ? cams : [];
      } catch (e) {
        camerasCache = [];
      }
    }

    function selectBestRearCameraIndex() {
      if (!camerasCache.length) return 0;
      const idx = camerasCache.findIndex(c =>
        /back|rear|environment|traseira|trasera|зад/i.test(c.label || "")
      );
      return idx >= 0 ? idx : 0;
    }

    async function tryStartWithConfig(cameraConfig) {
      html5QrCode = new Html5Qrcode("reader");

      await html5QrCode.start(
        cameraConfig,
        {
          fps: 10,
          qrbox: { width: 260, height: 260 },
          aspectRatio: 1,
          disableFlip: false,
          rememberLastUsedCamera: false,
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.DATA_MATRIX
          ]
        },
        async (decodedText) => {
          if (!decodedText || sendingNow || inFlightPause) return;
          await sendCodeToBot(decodedText, false);
        },
        () => {}
      );

      scannerStarted = true;
      setStatusByKey("statusReady", "info");
    }

    async function startScanner(preferredMode = "rear") {
      hideBanner();
      setStatusByKey("statusLoading", "info");

      await stopScanner();

      try {
        if (preferredMode === "rear") {
          try {
            await tryStartWithConfig({ facingMode: { exact: "environment" } });
            return;
          } catch (e) {
            await stopScanner();
          }

          try {
            await tryStartWithConfig({ facingMode: "environment" });
            return;
          } catch (e) {
            await stopScanner();
          }
        }

        await loadCameras();

        if (!camerasCache.length) {
          setStatusByKey("statusCameraNotFound", "error");
          return;
        }

        if (preferredMode === "rear") {
          currentCameraIndex = selectBestRearCameraIndex();
        } else if (preferredMode === "front") {
          const frontIdx = camerasCache.findIndex(c =>
            /front|user|facetime|перед/i.test(c.label || "")
          );
          currentCameraIndex = frontIdx >= 0 ? frontIdx : 0;
        } else if (typeof preferredMode === "number") {
          currentCameraIndex = preferredMode;
        }

        await tryStartWithConfig(camerasCache[currentCameraIndex].id);
      } catch (e) {
        console.error("Scanner start error:", e);
        setStatusByKey("statusCameraError", "error");
        showBanner(tr("bannerPermission"), "info");
      }
    }

    async function switchCamera() {
      await loadCameras();

      if (!camerasCache.length) {
        setStatusByKey("statusCameraNotFound", "error");
        return;
      }

      currentCameraIndex = (currentCameraIndex + 1) % camerasCache.length;
      await startScanner(currentCameraIndex);
      showBanner(tr("bannerSwitched"), "info");
    }

    restartBtn.addEventListener("click", async () => {
      await startScanner("rear");
    });

    switchBtn.addEventListener("click", async () => {
      await switchCamera();
    });

    closeBtn.addEventListener("click", async () => {
      try {
        await stopScanner();
      } catch (e) {}

      if (tg && typeof tg.close === "function") {
        tg.close();
      } else {
        window.close();
      }
    });

    sendManualBtn.addEventListener("click", async () => {
      await sendCodeToBot(manualCodeEl.value, true);
    });

    manualCodeEl.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        await sendCodeToBot(manualCodeEl.value, true);
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden) return;
      if (!scannerStarted && !sendingNow) {
        await startScanner("rear");
      }
    });

    window.addEventListener("beforeunload", async () => {
      try {
        await stopScanner();
      } catch (e) {}
    });

    setUserProfile();
    applyLanguage();
    startScanner("rear");
  </script>
</body>
</html>
